name: Check PR conventions
run-name: "Check PR conventions: ${{ github.event.pull_request.title }}"

on:
  pull_request:
    types:
      - opened
      - edited

permissions:
  pull-requests: write
  id-token: write

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ secrets.CHECK_PR_CONVENTIONS_URL }}

      - name: Check title and add comment if invalid
        uses: ./.github/actions/check-conventions
        with:
          title: ${{ github.event.pull_request.title }}
          issue-number: ${{ github.event.pull_request.number }}
          cloud-run-url: ${{ secrets.CHECK_PR_CONVENTIONS_URL }}
          oidc-token: ${{ steps.auth.outputs.id_token }}
