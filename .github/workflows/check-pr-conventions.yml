name: Check PR conventions
run-name: "Check PR conventions: ${{ github.event.pull_request.title }}"

on:
  pull_request:
    types:
      - opened
      - edited

permissions:
  pull-requests: write
  id-token: write

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ secrets.CHECK_PR_CONVENTIONS_URL }}

      - name: Check title and add comment if invalid
        uses: actions/github-script@v7
        env:
          CLOUD_RUN_URL: ${{ secrets.CHECK_PR_CONVENTIONS_URL }}
          OIDC_TOKEN: ${{ steps.auth.outputs.id_token }}
        with:
          script: |
            try {
              const response = await fetch(process.env.CLOUD_RUN_URL, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.OIDC_TOKEN}`
                },
                body: JSON.stringify({ title: context.payload.pull_request.title })
              });

              if (!response.ok) {
                core.setFailed(`Cloud Run Function returned ${response.status}: ${await response.text()}`);
                return;
              }

              const data = await response.json();

              if (!data.valid && data.comment) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: data.comment
                });
              }
            } catch (error) {
              core.setFailed(`Unexpected error: ${error.message}`);
            }
