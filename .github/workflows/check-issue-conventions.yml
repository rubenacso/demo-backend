name: Check issue conventions
run-name: "Check issue conventions: ${{ github.event.issue.title }}"

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write
  id-token: write

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ secrets.CHECK_ISSUE_TITLE_URL }}

      - name: Check title and add comment if invalid
        uses: ./.github/actions/check-conventions
        with:
          title: ${{ github.event.issue.title }}
          issue-number: ${{ github.event.issue.number }}
          cloud-run-url: ${{ secrets.CHECK_ISSUE_TITLE_URL }}
          oidc-token: ${{ steps.auth.outputs.id_token }}
