name: Check conventions
description: Calls a Cloud Run function to check a title and adds a comment if invalid

inputs:
  title:
    description: Title to check
    required: true
  issue-number:
    description: Issue or PR number to comment on
    required: true
  cloud-run-url:
    description: URL of the Cloud Run function
    required: true
  oidc-token:
    description: OIDC token for authenticating against Cloud Run
    required: true

runs:
  using: composite
  steps:
    - name: Check title and add comment if invalid
      uses: actions/github-script@v7
      env:
        TITLE: ${{ inputs.title }}
        ISSUE_NUMBER: ${{ inputs.issue-number }}
        CLOUD_RUN_URL: ${{ inputs.cloud-run-url }}
        OIDC_TOKEN: ${{ inputs.oidc-token }}
      with:
        script: |
          try {
            const response = await fetch(process.env.CLOUD_RUN_URL, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.OIDC_TOKEN}`
              },
              body: JSON.stringify({ title: process.env.TITLE })
            });

            if (!response.ok) {
              core.setFailed(`Cloud Run Function returned ${response.status}: ${await response.text()}`);
              return;
            }

            const data = await response.json();

            if (!data.valid && data.comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(process.env.ISSUE_NUMBER),
                body: data.comment
              });
            }
          } catch (error) {
            core.setFailed(`Unexpected error: ${error.message}`);
          }
